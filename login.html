<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Admin Login
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#111827;
            padding:40px;
            border-radius:14px;
            width:400px;
        }

        h1{
            color:white;
            margin-bottom:30px;
            text-align:center;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#6c63ff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>
        Admin Login
    </h1>

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
    >

    <button onclick="login()">
        Login
    </button>

</div>

<script>

async function login() {

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try {

        const response = await fetch(
            "http://localhost:5000/api/admin/login",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json",
                },

                body: JSON.stringify({
                    email,
                    password,
                }),
            }
        );

        const data =
        await response.json();

        if (data.success) {

            localStorage.setItem(
                "adminToken",
                data.token
            );

            alert("Login Successful");

            window.location.href =
            "admin.html";

        } else {

            alert(data.message);

        }

    } catch (error) {

        console.log(error);

        alert("Server Error");

    }

}

</script>

</body>

</html>
