<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Davine Technologies - Internship ID Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
 --blue:#2563EB;
 --navy:#0F172A;
 --muted:#64748B;
 --line:#E2E8F0;
 --white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#eef2f7;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
 font-family:Inter,sans-serif;
}
.card{
 width:1012px;
 height:638px;
 background:#fff;
 border-radius:22px;
 overflow:hidden;
 display:grid;
 grid-template-columns:712px 300px;
 box-shadow:0 20px 45px rgba(0,0,0,.12);
}
.left{
 padding:42px 46px;
 display:grid;
 grid-template-rows:auto auto auto 1fr auto;
}
.header{
 display:flex;
 align-items:center;
 border-bottom:1px solid var(--line);
 padding-bottom:20px;
}
.logo{
 width:82px;
 height:82px;
 object-fit:contain;
 margin-right:18px;
}
.brand h1{
 font-size:34px;
 font-weight:800;
 color:var(--navy);
}
.brand p{
 margin-top:6px;
 font-size:13px;
 text-transform:uppercase;
 letter-spacing:.16em;
 color:var(--muted);
}
.identity{
 padding:24px 0 18px;
}
.identity h2{
 font-size:54px;
 line-height:1.05;
 color:var(--navy);
 font-weight:800;
}
.identity h3{
 margin-top:12px;
 color:var(--blue);
 font-size:19px;
 text-transform:uppercase;
 letter-spacing:.08em;
}
.table{
 border-top:1px solid var(--line);
 border-bottom:1px solid var(--line);
 padding:24px 0;
}
.row{
 display:grid;
 grid-template-columns:180px 1fr;
 padding:12px 0;
 align-items:center;
}
.label{
 color:var(--muted);
 font-size:12px;
 text-transform:uppercase;
 letter-spacing:.12em;
 font-weight:700;
}
.value{
 font-size:20px;
 font-weight:700;
 color:var(--navy);
}
.spacer{}
.footer{
 display:flex;
 justify-content:space-between;
 align-items:flex-end;
 padding-top:24px;
}
.website{
 font-size:15px;
 font-weight:700;
 color:var(--muted);
}
.stamp{
 text-align:center;
}
.stamp small{
 display:block;
 margin-bottom:8px;
 color:#94A3B8;
 text-transform:uppercase;
 letter-spacing:.12em;
 font-weight:700;
}
.stamp img{
 height:100px;
 object-fit:contain;
}
.right{
 background:var(--blue);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:#fff;
 padding:34px;
}
.qrbox{
 width:180px;
 height:180px;
 border-radius:18px;
 background:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
}
.qrbox img{
 width:145px;
 height:145px;
 object-fit:contain;
}
.cap{
 margin-top:22px;
 font-size:12px;
 letter-spacing:.14em;
 text-transform:uppercase;
 opacity:.9;
}
.id{
 margin-top:10px;
 font-size:22px;
 font-weight:700;
}
.badge{
 margin-top:28px;
 background:#fff;
 color:var(--blue);
 border-radius:999px;
 padding:12px 34px;
 font-size:13px;
 font-weight:800;
 letter-spacing:.14em;
 text-transform:uppercase;
}
</style>
</head>
<body>
<div class="card">
<div class="left">
<div class="header">
<img class="logo" src="{{LOGO}}">
<div class="brand">
<h1>Davine Technologies</h1>
<p>Intern Identity Card</p>
</div>
</div>

<div class="identity">
<h2>{{FULL_NAME}}</h2>
<h3>{{ROLE}}</h3>
</div>

<div class="table">
<div class="row"><div class="label">Intern ID</div><div class="value">{{INTERN_ID}}</div></div>
<div class="row"><div class="label">Role</div><div class="value">{{ROLE}}</div></div>
<div class="row"><div class="label">Joining Date</div><div class="value">{{JOINING_DATE}}</div></div>
<div class="row"><div class="label">Status</div><div class="value">Active</div></div>
</div>

<div class="spacer"></div>

<div class="footer">
<div class="website">www.davinetechnologies.com</div>
<div class="stamp">
<small>HR Department</small>
<img src="{{STAMP}}">
</div>
</div>
</div>

<div class="right">
<div class="qrbox"><img src="{{QR_CODE}}"></div>
<div class="cap">Verification QR</div>
<div class="id">{{INTERN_ID}}</div>
<div class="badge">Verified</div>
</div>
</div>
</body>
</html>
