<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Davine Technologies — Internship ID Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2563EB;
    --navy:#0F172A;
    --gray:#64748B;
    --gray-dark:#475569;
    --gray-light:#94A3B8;
    --hairline:#E2E8F0;
    --white:#FFFFFF;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;}
  body{
    font-family:'Inter', sans-serif;
    background:#EEF1F6;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .card{
    width:1012px;
    height:638px;
    background:var(--white);
    border-radius:20px;
    box-shadow:0 24px 48px -20px rgba(15,23,42,0.18), 0 8px 20px -12px rgba(15,23,42,0.10);
    display:flex;
    overflow:hidden;
    position:relative;
  }

  /* ---------------- LEFT (WHITE) SECTION ---------------- */
  .card-left{
    width:712px;              /* 1012 - 300 (right panel): panels sum exactly to card width, no leftover gap */
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    padding:44px 48px;        /* equal left/right margins, balanced top/bottom */
  }

  /* Header: logo + wordmark, vertically centered as one block.
     Uses margin (not gap) for maximum rendering-engine compatibility. */
  .header{
    display:flex;
    align-items:center;
    height:64px;
  }
  .logo{
    height:64px;
    max-width:196px;
    width:auto;
    object-fit:contain;
    display:block;
    margin-right:16px;
  }
  .brand-text{
    display:flex;
    flex-direction:column;
    justify-content:center;
    height:64px;
  }
  .brand-name{
    font-size:30px;
    font-weight:800;
    color:var(--navy);
    letter-spacing:-0.01em;
    line-height:1;
  }
  .brand-subtitle{
    font-size:12.5px;
    font-weight:600;
    color:var(--gray-dark);
    letter-spacing:0.14em;
    text-transform:uppercase;
    line-height:1;
    margin-top:6px;
  }

  /* Identity block: name + role — the dominant visual element */
  .identity{
    margin-top:28px;
    padding-top:24px;
    border-top:1px solid var(--hairline);
  }
  .intern-name{
    font-size:52px;
    font-weight:800;
    color:var(--navy);
    letter-spacing:-0.02em;
    line-height:1.05;
  }
  .intern-role{
    font-size:17px;
    font-weight:700;
    color:var(--blue);
    letter-spacing:0.08em;
    text-transform:uppercase;
    line-height:1;
    margin-top:10px;
  }

  /* Information table — flex rows with a fixed label column for exact alignment */
  .info-table{
    margin-top:28px;
    padding-top:24px;
    border-top:1px solid var(--hairline);
    display:flex;
    flex-direction:column;
  }
  .info-row{
    display:flex;
    align-items:center;
  }
  .info-row + .info-row{
    margin-top:18px;
  }
  .info-label{
    width:156px;
    flex-shrink:0;
    font-size:12px;
    font-weight:700;
    color:var(--gray);
    letter-spacing:0.10em;
    text-transform:uppercase;
    line-height:1;
  }
  .info-value{
    font-size:19px;
    font-weight:700;
    color:var(--navy);
    letter-spacing:0.01em;
    line-height:1;
  }

  /* Footer: website bottom-left, HR seal bottom-right, on a shared baseline */
  .footer{
    margin-top:auto;
    padding-top:24px;
    border-top:1px solid var(--hairline);
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
  }
  .footer-website{
    font-size:14px;
    font-weight:700;
    color:var(--gray-dark);
    letter-spacing:0.03em;
    line-height:1;
  }
  .footer-stamp{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .stamp-label{
    font-size:12px;
    font-weight:700;
    color:var(--gray-light);
    letter-spacing:0.12em;
    text-transform:uppercase;
    line-height:1;
    margin-bottom:8px;
  }
  .stamp-img{
    height:72px;
    width:auto;
    max-width:196px;
    object-fit:contain;
    display:block;
  }

  /* ---------------- RIGHT (BLUE) PANEL ---------------- */
  .card-right{
    width:300px;
    flex-shrink:0;
    background:var(--blue);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 28px;
    text-align:center;
  }

  .qr-frame{
    width:168px;
    height:168px;
    background:var(--white);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .qr-img{
    width:132px;
    height:132px;
    object-fit:contain;
    display:block;
  }

  .qr-caption{
    font-size:12px;
    font-weight:600;
    color:rgba(255,255,255,0.82);
    letter-spacing:0.14em;
    text-transform:uppercase;
    line-height:1;
    margin-top:24px;
  }

  .qr-id{
    font-size:18px;
    font-weight:700;
    color:var(--white);
    letter-spacing:0.03em;
    line-height:1;
    margin-top:12px;
  }

  .verified-badge{
    margin-top:24px;
    padding:11px 32px;
    border-radius:999px;
    background:var(--white);
    color:var(--blue);
    font-size:12.5px;
    font-weight:800;
    letter-spacing:0.14em;
    text-transform:uppercase;
    line-height:1;
  }
</style>
</head>
<body>

  <div class="card">

    <div class="card-left">

      <header class="header">
        <img src="{{LOGO}}" alt="Davine Technologies" class="logo">
        <div class="brand-text">
          <div class="brand-name">Davine Technologies</div>
          <div class="brand-subtitle">Intern Identity Card</div>
        </div>
      </header>

      <div class="identity">
        <div class="intern-name">{{FULL_NAME}}</div>
        <div class="intern-role">{{ROLE}}</div>
      </div>

      <div class="info-table">
        <div class="info-row">
          <span class="info-label">Intern ID</span>
          <span class="info-value">{{INTERN_ID}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Role</span>
          <span class="info-value">{{ROLE}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Joining Date</span>
          <span class="info-value">{{JOINING_DATE}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Status</span>
          <span class="info-value">Active</span>
        </div>
      </div>

      <footer class="footer">
        <span class="footer-website">www.davinetechnologies.com</span>
        <div class="footer-stamp">
          <span class="stamp-label">HR Department</span>
          <img src="{{STAMP}}" alt="Official HR Department Stamp" class="stamp-img">
        </div>
      </footer>

    </div>

    <div class="card-right">
      <div class="qr-frame">
        <img src="{{QR_CODE}}" alt="Verification QR Code" class="qr-img">
      </div>
      <div class="qr-caption">Verification QR</div>
      <div class="qr-id">{{INTERN_ID}}</div>
      <div class="verified-badge">Verified</div>
    </div>

  </div>

</body>
</html>
